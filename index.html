  <script>
    (function() {
      const themeToggle = document.getElementById('themeToggle');
      const icon = themeToggle.querySelector('i');

      function setTheme(isDark) {
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        icon.classList.toggle('fa-sun', isDark);
        icon.classList.toggle('fa-moon', !isDark);
      }

      // Follow OS (live)
      const mql = window.matchMedia('(prefers-color-scheme: dark)');
      setTheme(mql.matches);
      if (typeof mql.addEventListener === 'function') {
        mql.addEventListener('change', function (e) { setTheme(e.matches); });
      } else if (typeof mql.addListener === 'function') {
        mql.addListener(function (e) { setTheme(e.matches); });
      }

      // Clear stale persisted preference (site now tracks OS)
      try { localStorage.removeItem('theme'); } catch (_) {}

      // Toggle button = temporary override for this page (not persisted,
      // next OS change or page reload will re-sync).
      themeToggle.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        setTheme(!isDark);
      });

      if ('IntersectionObserver' in window) {
        const observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });

        document.querySelectorAll('.section').forEach(function(el) {
          observer.observe(el);
        });
      } else {
        document.querySelectorAll('.section').forEach(function(el) {
          el.classList.add('visible');
        });
      }
    })();
  </script>
