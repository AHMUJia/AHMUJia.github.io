<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" role="img" aria-label="前列腺癌免疫微环境与多组学示意图">
  <rect width="280" height="200" rx="12" fill="#f0f5f5"/>

  <!-- Central tumor (irregular shape) -->
  <path d="M 108 70 Q 95 60, 108 48 Q 130 38, 154 46 Q 180 50, 186 78 Q 195 104, 176 122 Q 156 138, 130 132 Q 102 128, 96 106 Q 90 86, 108 70 Z"
        fill="#126f77"/>
  <!-- Tumor highlights (nodules) -->
  <circle cx="128" cy="72" r="4" fill="#fff" opacity="0.35"/>
  <circle cx="155" cy="92" r="3" fill="#fff" opacity="0.35"/>
  <circle cx="140" cy="110" r="3.5" fill="#fff" opacity="0.35"/>
  <text x="140" y="94" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-size="10" font-weight="700">tumor</text>

  <!-- Surrounding immune cells -->
  <!-- Proinflammatory (gold) -->
  <circle cx="52" cy="56" r="9" fill="#fff" stroke="#c7a063" stroke-width="2"/>
  <circle cx="52" cy="56" r="3" fill="#c7a063"/>
  <circle cx="232" cy="130" r="9" fill="#fff" stroke="#c7a063" stroke-width="2"/>
  <circle cx="232" cy="130" r="3" fill="#c7a063"/>
  <!-- Regulatory / suppressive (teal) -->
  <circle cx="225" cy="55" r="9" fill="#fff" stroke="#22757d" stroke-width="2"/>
  <circle cx="225" cy="55" r="3" fill="#22757d"/>
  <circle cx="48" cy="128" r="9" fill="#fff" stroke="#22757d" stroke-width="2"/>
  <circle cx="48" cy="128" r="3" fill="#22757d"/>
  <!-- Extra cells -->
  <circle cx="30" cy="90" r="7" fill="#fff" stroke="#c7a063" stroke-width="1.8"/>
  <circle cx="30" cy="90" r="2.5" fill="#c7a063"/>
  <circle cx="250" cy="90" r="7" fill="#fff" stroke="#22757d" stroke-width="1.8"/>
  <circle cx="250" cy="90" r="2.5" fill="#22757d"/>

  <!-- Multi-omics layers at bottom -->
  <g>
    <rect x="26" y="160" width="228" height="9" rx="2.5" fill="#22757d" opacity="0.55"/>
    <rect x="26" y="172" width="228" height="9" rx="2.5" fill="#126f77" opacity="0.75"/>
    <rect x="26" y="184" width="228" height="9" rx="2.5" fill="#0e5a61" opacity="0.9"/>
    <text x="32" y="167" fill="#fff" font-family="Inter,sans-serif" font-size="7" font-weight="700">DNA</text>
    <text x="32" y="179" fill="#fff" font-family="Inter,sans-serif" font-size="7" font-weight="700">RNA</text>
    <text x="32" y="191" fill="#fff" font-family="Inter,sans-serif" font-size="7" font-weight="700">Protein</text>
    <text x="248" y="191" fill="#fff" font-family="Inter,sans-serif" font-size="7" font-weight="700" text-anchor="end">multi-omics</text>
  </g>
</svg>
