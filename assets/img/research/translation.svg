<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" role="img" aria-label="机制-数据-证据-临床 闭环">
  <rect width="280" height="200" rx="12" fill="#f0f5f5"/>

  <defs>
    <marker id="arrLoop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#126f77"/>
    </marker>
  </defs>

  <!-- Top: Mechanism (flask) -->
  <g>
    <circle cx="140" cy="42" r="24" fill="#126f77"/>
    <path d="M134 32 v6 l-7 11 h26 l-7 -11 v-6 z" fill="none" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/>
    <line x1="133" y1="30" x2="147" y2="30" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="140" cy="46" r="2" fill="#fff" opacity="0.75"/>
    <text x="140" y="82" text-anchor="middle" fill="#126f77" font-family="Inter,sans-serif" font-size="10" font-weight="700">机制</text>
  </g>

  <!-- Right: Multi-omics / MR / Meta (bars) -->
  <g>
    <circle cx="232" cy="100" r="24" fill="#22757d"/>
    <rect x="222" y="100" width="4" height="10" fill="#fff"/>
    <rect x="228" y="92" width="4" height="18" fill="#fff"/>
    <rect x="234" y="96" width="4" height="14" fill="#fff"/>
    <rect x="240" y="88" width="4" height="22" fill="#fff"/>
    <text x="232" y="140" text-anchor="middle" fill="#126f77" font-family="Inter,sans-serif" font-size="10" font-weight="700">数据</text>
  </g>

  <!-- Bottom: Evidence (checkmark) -->
  <g>
    <circle cx="140" cy="158" r="24" fill="#0e5a61"/>
    <path d="M129 158 l7 7 l14 -14" stroke="#fff" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="140" y="197" text-anchor="middle" fill="#126f77" font-family="Inter,sans-serif" font-size="10" font-weight="700">证据</text>
  </g>

  <!-- Left: Clinic (medical cross) -->
  <g>
    <circle cx="48" cy="100" r="24" fill="#c7a063"/>
    <path d="M44 88 h8 v8 h8 v8 h-8 v8 h-8 v-8 h-8 v-8 h8 z" fill="#fff"/>
    <text x="48" y="140" text-anchor="middle" fill="#8a6a2c" font-family="Inter,sans-serif" font-size="10" font-weight="700">临床</text>
  </g>

  <!-- Circular flow arrows -->
  <g stroke="#126f77" stroke-width="1.6" fill="none" stroke-dasharray="3.5 3" opacity="0.75">
    <path d="M 162 52 Q 205 62, 215 82" marker-end="url(#arrLoop)"/>
    <path d="M 222 122 Q 200 150, 164 154" marker-end="url(#arrLoop)"/>
    <path d="M 116 154 Q 78 148, 64 120" marker-end="url(#arrLoop)"/>
    <path d="M 58 80 Q 90 58, 116 52" marker-end="url(#arrLoop)"/>
  </g>
</svg>
