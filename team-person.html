  <script>
    /* Show "Edit this page" button when the visitor is logged in as admin
       or as the member that owns this slug. Silently no-ops if /api/me 401s. */
    (function () {
      fetch('/api/me', { credentials: 'same-origin' })
        .then(r => r.ok ? r.json() : null)
        .then(me => {
          if (!me) return;
          const slug = new URLSearchParams(location.search).get('slug');
          const btn = document.getElementById('edit-this-page');
          if (!btn) return;
          if (me.role === 'admin') { btn.href = './admin.html#team'; btn.hidden = false; }
          else if (me.memberSlug && me.memberSlug === slug) { btn.href = './admin.html#me-page'; btn.hidden = false; }
        })
        .catch(() => {});
    })();
  </script>
  <script>
    (function() {
      const themeToggle = document.getElementById('themeToggle');
      const icon = themeToggle.querySelector('i');
      function setTheme(isDark) {
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        icon.classList.toggle('fa-sun', isDark);
        icon.classList.toggle('fa-moon', !isDark);
      }
      const mql = window.matchMedia('(prefers-color-scheme: dark)');
      setTheme(mql.matches);
      if (typeof mql.addEventListener === 'function') {
        mql.addEventListener('change', function(e) { setTheme(e.matches); });
      } else if (typeof mql.addListener === 'function') {
        mql.addListener(function(e) { setTheme(e.matches); });
      }
      try { localStorage.removeItem('theme'); } catch (_) {}
      themeToggle.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        setTheme(!isDark);
      });
      if ('IntersectionObserver' in window) {
        const observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });
        document.querySelectorAll('.section').forEach(function(el) { observer.observe(el); });
      } else {
        document.querySelectorAll('.section').forEach(function(el) { el.classList.add('visible'); });
      }
    })();
  </script>
