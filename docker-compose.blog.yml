# UroExplorer 独立 compose — 走 "中央 Caddy + 共享 web network" 方案。
#
# 配套部署：
#   /opt/caddy/         独立的 Caddy（中央反代）
#   /opt/papertracker/  papertracker app（去掉了 caddy 子服务）
#   /opt/mengjialin-site/  本仓库（含本 compose）
# 都加入同一个外部 docker network: web
#
# 启动：
#   cd /opt/mengjialin-site
#   docker compose -f docker-compose.blog.yml up -d --build
#
# 必须在 /opt/mengjialin-site/.env 里有一行：
#   UROEXPLORER_SESSION_SECRET=<openssl rand -hex 32 的输出>

services:
  uroexplorer-admin:
    build: ./server
    image: uroexplorer-admin:latest
    container_name: uroexplorer-admin
    restart: unless-stopped
    environment:
      SESSION_SECRET: ${UROEXPLORER_SESSION_SECRET:?Set UROEXPLORER_SESSION_SECRET in /opt/mengjialin-site/.env}
      NODE_ENV: production
      SITE_DIR: /site
      DATA_DIR: /data
      PORT: "3000"
    volumes:
      - /opt/mengjialin-site:/site:rw
      - /opt/mengjialin-admin-data:/data:rw
    networks:
      - web
    expose:
      - "3000"

networks:
  web:
    external: true
